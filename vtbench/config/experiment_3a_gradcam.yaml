experiment:
  name: experiment_3a_gradcam
  output_dir: results/experiment_3a
  dataset_root: UCRArchive_2018
  dataset_ext: tsv
  dataset_format: ucr
  datasets:
    - ECG200
    - ItalyPowerDemand
    - GunPoint
    - Wafer
    - Coffee
  dataset_category:
    ECG200: encoding-invariant
    ItalyPowerDemand: encoding-invariant
    GunPoint: encoding-dominant-motion
    Wafer: encoding-sensitive-non-motion
    Coffee: encoding-sensitive-non-motion
  chart_types:
    - line
    - area
    - bar
    - scatter
  samples_per_class: 10
  cam_target: pred
  seed: 1337
  overlay_alpha: 0.5
  grid_cell_size: 160
  grid_padding: 6
  grid_bgcolor: [255, 255, 255]

model:
  type: single_modal_chart
  chart_model: deepcnn
  pretrained: false

training:
  batch_size: 32
  epochs: 100
  learning_rate: 0.0005
  val_size: 0.2

image_generation:
  generate_images: true
  overwrite_existing: false

chart:
  color_mode: color
  label_mode: with_label
  bar_mode: border
  scatter_mode: plain
