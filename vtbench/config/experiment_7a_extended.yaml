# ============================================================
# Experiment 7A - Extended Image Encodings
# ============================================================
# Phase space plots, preprocessed variants, new RGB combos.
# These go beyond Wang & Oates 2015 standard methods.
# ============================================================

experiment:
  name: experiment_7a_extended
  output_dir: results/experiment_7a_extended
  image_size: 128
  seeds: [42, 123, 7]
  dataset_root: UCRArchive_2018
  dataset_ext: tsv

  datasets:
    - SyntheticControl
    - GunPoint
    - CBF
    - Trace
    - ECG5000
    # FordA, Wafer → deferred to cloud (GPU OOM risk)

  encodings:
    - phase_scatter
    - phase_trajectory
    - phase_tau_auto
    - gasf_diff
    - gasf_cumsum
    - rp_diff

  rgb_encodings:
    - phase_gasf_rp
    - phase_cwt_mtf
    - gasf_gasfdiff_gadf
    - phase_multi_tau

  models:
    - { name: "deepcnn",     chart_model: "deepcnn",  pretrained: false, lr: 0.001 }
    - { name: "resnet18_pt", chart_model: "resnet18", pretrained: true,  lr: 0.0005 }

training:
  batch_size: 512
  epochs: 100
