# ============================================================
# Experiment 5E — Two-Branch Fusion (Full Run)
# ============================================================
# Tests chart + numerical branch fusion (FCN, OS-CNN)
# ============================================================

experiment:
  name: experiment_5e_full
  output_dir: results/experiment_5e_full
  dataset_root: UCRArchive_2018
  dataset_ext: tsv
  dataset_format: ucr
  seeds: [42, 123, 7]

  datasets:
    - SyntheticControl
    - GunPoint
    - CBF
    - Trace
    - ECG5000

  chart_types:
    - line
    - area

  numerical_models: [fcn, oscnn]
  fusion_mode: concat

augmentations:
  - type: gaussian_blur
    levels:
      - { sigma: 1.0 }
  - type: crop_horizontal
    levels:
      - { crop_fraction: 0.10 }
  - type: gaussian_noise
    levels:
      - { sigma: 25, seed: 0 }
  - type: jpeg_compress
    levels:
      - { quality: 20 }

model:
  type: two_branch
  chart_model: deepcnn
  pretrained: false
  numerical_branch: fcn
  fusion: concat

training:
  batch_size: 64
  epochs: 100
  learning_rate: 0.001
  val_size: 0.2

image_generation:
  generate_images: true
  overwrite_existing: false

chart:
  color_mode: color
  label_mode: with_label
  bar_mode: border
  scatter_mode: plain
