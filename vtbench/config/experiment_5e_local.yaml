experiment:
  name: experiment_5e_local
  output_dir: results/experiment_5e_local
  dataset_root: UCRArchive_2018
  dataset_ext: tsv
  dataset_format: ucr
  seeds: [42]

  datasets:
    - name: SyntheticControl
      num_classes: 6

  chart_types: [line]

  numerical_models: [fcn]
  fusion_mode: concat

model:
  type: two_branch
  chart_model: deepcnn
  pretrained: false
  numerical_branch: fcn
  fusion: concat

training:
  batch_size: 64
  epochs: 30
  learning_rate: 0.001

image_generation:
  generate_images: true
  overwrite_existing: false

chart:
  color_mode: color
  label_mode: with_label
