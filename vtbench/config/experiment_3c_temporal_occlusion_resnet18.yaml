experiment:
  name: experiment_3c_temporal_occlusion_resnet18
  output_dir: results/experiment_3c_resnet18
  dataset_root: UCRArchive_2018
  dataset_ext: tsv
  dataset_format: ucr
  datasets:
    - Beef
    - GunPoint
    - FordB
    - ArrowHead
    - Coffee
    - Herring
    - Lightning2
    - ToeSegmentation1
    - Adiac
    - CricketX
    - CricketY
    - CricketZ
    - Earthquakes
    - FaceAll
    - TwoPatterns
    - SyntheticControl
    - ShapeletSim
    - MoteStrain
    - TwoLeadECG
    - Lightning7
  chart_types:
    - line
    - area
    - bar
    - scatter
  samples_per_dataset: 3
  correct_only: true
  seed: 42

occlusion:
  window_fraction: 0.10
  stride_fraction: 0.05
  fill_strategy: zero
  score: logit_drop

model:
  type: single_modal_chart
  chart_model: resnet18
  pretrained: true

training:
  batch_size: 32
  epochs: 100
  learning_rate: 0.0005
  val_size: 0.2

image_generation:
  generate_images: true
  overwrite_existing: false

chart:
  color_mode: color
  label_mode: with_label
  bar_mode: border
  scatter_mode: plain
