# ============================================================
# Experiment 8B — CLOUD ONLY (FordA Compute Profile)
# ============================================================
# FordA profiling that causes GPU OOM on RTX 5070 Ti 16GB.
# Run on cloud server with ≥24GB VRAM.
# ============================================================

experiment:
  output_dir: results/experiment_8b_compute_profile
  seed: 42
  image_size: 128

  datasets:
    - FordA         # 3601 train, large scale

  chart_encodings:
    - line
    - area
    - bar
    - scatter

  math_encodings:
    - gasf
    - gadf
    - mtf
    - rp
    - rp_grayscale
    - cwt
    - stft

  rgb_encodings:
    - gasf_gadf_mtf
    - rp_cwt_stft

  extended_encodings:
    - phase_trajectory
    - phase_scatter
    - phase_gasf_rp
    - phase_cwt_mtf

  models:
    - name: deepcnn
      chart_model: deepcnn
      pretrained: false
      lr: 0.001
    - name: resnet18_pt
      chart_model: resnet18
      pretrained: true
      lr: 0.0005

training:
  batch_size: 128
  epochs: 100
