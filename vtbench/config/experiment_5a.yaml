experiment:
  name: experiment_5a_train_augmentation
  output_dir: results/experiment_5a_train_augmentation
  dataset_root: UCRArchive_2018
  dataset_ext: tsv
  dataset_format: ucr
  seeds: [42]
  datasets:
    - SyntheticControl
    - GunPoint
  chart_types:
    - line
    - area
  regimes:
    - null     # baseline (no augmentation)
    - mild
    - moderate
    - heavy

augmentations:
  - type: gaussian_blur
    levels:
      - { sigma: 0.5 }
      - { sigma: 1.0 }
      - { sigma: 2.0 }
  - type: crop_horizontal
    levels:
      - { crop_fraction: 0.05 }
      - { crop_fraction: 0.10 }
  - type: gaussian_noise
    levels:
      - { sigma: 10, seed: 0 }
      - { sigma: 25, seed: 0 }
  - type: jpeg_compress
    levels:
      - { quality: 50 }
      - { quality: 20 }

model:
  type: single_modal_chart
  chart_model: deepcnn
  pretrained: false

training:
  batch_size: 64
  epochs: 100
  learning_rate: 0.001
  val_size: 0.2

image_generation:
  generate_images: true
  overwrite_existing: false

chart:
  color_mode: color
  label_mode: with_label
  bar_mode: border
  scatter_mode: plain
