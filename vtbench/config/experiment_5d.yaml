experiment:
  name: experiment_5d_rendering
  output_dir: results/experiment_5d_rendering
  dataset_root: UCRArchive_2018
  dataset_ext: tsv
  dataset_format: ucr
  seeds: [42]
  datasets:
    - SyntheticControl
    - GunPoint
  chart_types:
    - line
    - area
    - scatter
  render_variants:
    - { name: "baseline", params: {} }
    - { name: "no_labels", params: { label_mode: "without_label" } }
    - { name: "thick_lines", params: { linewidth: 3.0 } }
    - { name: "large_dots", params: { scatter_size: 30 } }

augmentations:
  - type: gaussian_blur
    levels:
      - { sigma: 1.0 }
      - { sigma: 2.0 }
  - type: gaussian_noise
    levels:
      - { sigma: 25, seed: 0 }

model:
  type: single_modal_chart
  chart_model: deepcnn
  pretrained: false

training:
  batch_size: 64
  epochs: 100
  learning_rate: 0.001
  val_size: 0.2

image_generation:
  generate_images: true
  overwrite_existing: true

chart:
  color_mode: color
  label_mode: with_label
  bar_mode: border
  scatter_mode: plain
