# ============================================================
# Experiment 5G — Chart Type Systematic Comparison
# ============================================================
# Compares all 4 chart types (line, area, bar, scatter) head-to-head
# on the same datasets. Motivated by 5A finding that Trace scatter=1.0
# vs line=0.19 — chart type selection may be dataset-dependent.
#
# Uses the original 5 experiment datasets plus 3 additional to
# increase statistical power.
# ============================================================

experiment:
  name: experiment_5g_chart_type
  output_dir: results/experiment_5g_chart_type
  dataset_root: UCRArchive_2018
  dataset_ext: tsv
  dataset_format: ucr
  seeds: [42, 123, 7]

  datasets:
    - SyntheticControl    # 300 train,  60 length, 6 classes
    - GunPoint            #  50 train, 150 length, 2 classes
    - CBF                 #  30 train, 128 length, 3 classes
    - Trace               # 100 train, 275 length, 4 classes
    - ECG5000             # 500 train, 140 length, 5 classes
    - FordA               # 3601 train, 500 length, 2 classes
    - Wafer               # 1000 train, 152 length, 2 classes
    - TwoPatterns         # 1000 train, 128 length, 4 classes

  chart_types:
    - line
    - area
    - bar
    - scatter

augmentations:
  - type: gaussian_blur
    levels:
      - { sigma: 1.0 }
  - type: gaussian_noise
    levels:
      - { sigma: 25, seed: 0 }
  - type: jpeg_compress
    levels:
      - { quality: 20 }

model:
  type: single_modal_chart
  chart_model: deepcnn
  pretrained: false

training:
  batch_size: 64
  epochs: 100
  learning_rate: 0.001
  val_size: 0.2

image_generation:
  generate_images: true
  overwrite_existing: false

chart:
  color_mode: color
  label_mode: with_label
  bar_mode: border
  scatter_mode: plain
