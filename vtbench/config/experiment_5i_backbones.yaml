# ============================================================
# Experiment 5I — Modern Backbone Comparison
# ============================================================
# Compares 4 chart encoders head-to-head:
#   - DeepCNN (baseline, random init, 0.3M params)
#   - ResNet18 (pretrained ImageNet, 11M params)
#   - EfficientNet-B0 (pretrained ImageNet, 5.3M params)
#   - ViT-Tiny (from scratch, 1.2M params)
#
# Hypothesis: Pretrained models should dramatically improve small-sample
# datasets (GunPoint, CBF) through transfer learning.
# ============================================================

experiment:
  name: experiment_5i_backbones
  output_dir: results/experiment_5i_backbones
  dataset_root: UCRArchive_2018
  dataset_ext: tsv
  dataset_format: ucr
  seeds: [42, 123, 7]

  datasets:
    - SyntheticControl    # 300 train, 6 classes
    - GunPoint            #  50 train, 2 classes
    - CBF                 #  30 train, 3 classes
    - Trace               # 100 train, 4 classes
    - ECG5000             # 500 train, 5 classes
    - FordA               # 3601 train, 2 classes
    - TwoPatterns         # 1000 train, 4 classes

  chart_types:
    - line
    - scatter

  model_configs:
    - { name: "deepcnn",               chart_model: "deepcnn",      pretrained: false, lr: 0.001 }
    - { name: "resnet18_pretrained",    chart_model: "resnet18",     pretrained: true,  lr: 0.0005 }
    - { name: "efficientnet_pretrained", chart_model: "efficientnet", pretrained: true,  lr: 0.0003 }
    # Deferred to A100:
    # - { name: "vit_tiny",            chart_model: "vit_tiny",     pretrained: false, lr: 0.0005 }

augmentations:
  - type: gaussian_blur
    levels:
      - { sigma: 1.0 }
  - type: gaussian_noise
    levels:
      - { sigma: 25, seed: 0 }
  - type: jpeg_compress
    levels:
      - { quality: 20 }

model:
  type: single_modal_chart
  chart_model: deepcnn
  pretrained: false

training:
  batch_size: 64
  epochs: 100
  learning_rate: 0.001
  val_size: 0.2
  image_size: 128

image_generation:
  generate_images: true
  overwrite_existing: false

chart:
  color_mode: color
  label_mode: with_label
  bar_mode: border
  scatter_mode: plain
