# ============================================================
# Experiment 5C — ResNet18 Backbone (Full Run)
# ============================================================
# Compares ResNet18 (pretrained + random init) vs DeepCNN baseline
# ============================================================

experiment:
  name: experiment_5c_full
  output_dir: results/experiment_5c_full
  dataset_root: UCRArchive_2018
  dataset_ext: tsv
  dataset_format: ucr
  seeds: [42, 123, 7]

  datasets:
    - SyntheticControl
    - GunPoint
    - CBF
    - Trace
    - ECG5000

  chart_types:
    - line
    - area

augmentations:
  - type: gaussian_blur
    levels:
      - { sigma: 1.0 }
  - type: crop_horizontal
    levels:
      - { crop_fraction: 0.10 }
  - type: gaussian_noise
    levels:
      - { sigma: 25, seed: 0 }
  - type: jpeg_compress
    levels:
      - { quality: 20 }

model:
  type: single_modal_chart
  chart_model: resnet18
  pretrained: true

training:
  batch_size: 64
  epochs: 100
  learning_rate: 0.0005
  val_size: 0.2

image_generation:
  generate_images: true
  overwrite_existing: false

chart:
  color_mode: color
  label_mode: with_label
  bar_mode: border
  scatter_mode: plain
