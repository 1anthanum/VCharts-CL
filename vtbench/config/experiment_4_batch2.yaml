# ============================================================
# Experiment 4 — Batch 2: 5 Additional Datasets, 3 Seeds
# ============================================================
# Multi-seed augmentation robustness experiment.
# Uses experiment_4_multiseed.py for repeated trials.
# ============================================================

experiment:
  name: experiment_4_batch2
  output_dir: results/experiment_4_batch2
  dataset_root: UCRArchive_2018
  dataset_ext: tsv
  dataset_format: ucr
  seeds: [42, 123, 7]
  datasets:
    - SyntheticControl    # 300 train, 60 length,  6 classes — short series, synthetic
    - SwedishLeaf         # 500 train, 128 length, 15 classes — high-class, botanical/shape
    - Trace               # 100 train, 275 length,  4 classes — industrial, smooth waveforms
    - CBF                 #  30 train, 128 length,  3 classes — tiny training set, classic
    - Fish                # 175 train, 463 length,  7 classes — shape/outline, long series
  chart_types:
    - line
    - area
    - bar
    - scatter
  samples_per_dataset: 3
  correct_only: true
  accuracy_only: true   # Phase 1: accuracy first; alignment in Phase 2

# ---- Augmentation sweep (same levels as batch 1) ----
augmentations:
  - type: gaussian_blur
    levels:
      - { sigma: 0.5 }
      - { sigma: 1.0 }
      - { sigma: 2.0 }
  - type: crop_horizontal
    levels:
      - { crop_fraction: 0.05 }
      - { crop_fraction: 0.10 }
  - type: stripe_mask
    levels:
      - { num_stripes: 3, stripe_width: 5 }
      - { num_stripes: 5, stripe_width: 5 }
  - type: gaussian_noise
    levels:
      - { sigma: 10, seed: 0 }
      - { sigma: 25, seed: 0 }
  - type: jpeg_compress
    levels:
      - { quality: 50 }
      - { quality: 20 }

# ---- Occlusion settings ----
occlusion:
  window_fraction: 0.10
  stride_fraction: 0.05
  fill_strategy: mean
  score: logit_drop

# ---- Model: DeepCNN ----
model:
  type: single_modal_chart
  chart_model: deepcnn
  pretrained: false

training:
  batch_size: 32
  epochs: 100
  learning_rate: 0.001
  val_size: 0.2

image_generation:
  generate_images: true
  overwrite_existing: false

chart:
  color_mode: color
  label_mode: with_label
  bar_mode: border
  scatter_mode: plain
