experiment:
  name: experiment_3b_sweep_part_a
  output_dir: results/experiment_3b_sweep_part_a
  dataset_root: UCRArchive_2018
  dataset_ext: tsv
  dataset_format: ucr
  datasets:
    - CricketX
    - CricketZ
    - ECG5000
    - Earthquakes
    - Computers
    - GunPoint
  chart_types:
    - scatter
  runs: 10
  seed: 42

model:
  type: single_modal_chart
  chart_model: deepcnn
  pretrained: false

training:
  batch_size: 32
  epochs: 100
  learning_rate: 0.0005
  val_size: 0.2

image_generation:
  generate_images: true
  overwrite_existing: false

chart:
  color_mode: color
  label_mode: with_label
  bar_mode: border
  scatter_mode: plain

ablations:
  scatter:
    fade_alpha: 0.2
    mask_threshold: 235

sweeps:
  scatter:
    fade_alpha: [1.0, 0.6, 0.4, 0.2, 0.1]
