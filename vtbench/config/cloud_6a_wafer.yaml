# ============================================================
# Experiment 6A — CLOUD ONLY (Remaining Wafer Runs)
# ============================================================
# 23 remaining Wafer seed=7 runs that crashed on RTX 5070 Ti.
# Run on cloud server with ≥24GB VRAM.
# Use --resume flag — CSV already has 691/714 results.
# ============================================================

experiment:
  name: experiment_6a_encodings
  output_dir: results/experiment_6a_encodings
  image_size: 128
  seeds: [7]  # Only seed=7 remaining
  dataset_root: UCRArchive_2018
  dataset_ext: tsv

  datasets:
    - Wafer             # 1000 train, 6164 test — the crash source

  encodings:
    - line
    - area
    - bar
    - scatter
    - gasf
    - gadf
    - mtf
    - rp
    - rp_grayscale
    - cwt
    - stft
    - gasf_gadf_mtf
    - rp_cwt_stft

  models:
    - { name: "deepcnn",     chart_model: "deepcnn",  pretrained: false, lr: 0.001 }
    - { name: "resnet18_pt", chart_model: "resnet18", pretrained: true,  lr: 0.0005 }

training:
  batch_size: 128
  epochs: 100
