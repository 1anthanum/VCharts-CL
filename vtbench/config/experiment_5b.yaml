experiment:
  name: experiment_5b_multi_chart_fusion
  output_dir: results/experiment_5b_multi_chart_fusion
  dataset_root: UCRArchive_2018
  dataset_ext: tsv
  dataset_format: ucr
  seeds: [42]
  datasets:
    - SyntheticControl
    - GunPoint
  fusion_mode: concat
  fusion_combos:
    - { name: "line_only", types: ["line"] }
    - { name: "area_only", types: ["area"] }
    - { name: "line_area", types: ["line", "area"] }
    - { name: "line_bar", types: ["line", "bar"] }
    - { name: "line_area_bar", types: ["line", "area", "bar"] }
    - { name: "all_four", types: ["line", "area", "bar", "scatter"] }

augmentations:
  - type: gaussian_blur
    levels:
      - { sigma: 0.5 }
      - { sigma: 1.0 }
      - { sigma: 2.0 }
  - type: gaussian_noise
    levels:
      - { sigma: 10, seed: 0 }
      - { sigma: 25, seed: 0 }
  - type: jpeg_compress
    levels:
      - { quality: 50 }
      - { quality: 20 }

model:
  chart_model: deepcnn
  pretrained: false
  numerical_branch: none
  fusion: concat

training:
  batch_size: 64
  epochs: 100
  learning_rate: 0.001
  val_size: 0.2

image_generation:
  generate_images: true
  overwrite_existing: false

chart:
  color_mode: color
  label_mode: with_label
  bar_mode: border
  scatter_mode: plain
